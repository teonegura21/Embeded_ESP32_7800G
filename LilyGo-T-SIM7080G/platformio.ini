[env:lilygo-t-sim7080x-s3]
platform = espressif32@6.3.0
framework = arduino
board = esp32s3box
; board = esp32dev

upload_speed =  921600
monitor_speed = 115200

build_flags =
    -DBOARD_HAS_PSRAM       

    ; Enable DARDUINO_USB_CDC_ON_BOOT will start printing and wait for terminal access during startup
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; Enable UARDUINO_USB_CDC_ON_BOOT will turn off printing and will not block when using the battery
    ; -UARDUINO_USB_CDC_ON_BOOT

    -DTINY_GSM_MODEM_SIM7080
    -DTINY_GSM_RX_BUFFER=1024
    -DCAYENNE_PRINT=Serial
    -DDUMP_AT_COMMANDS    ; Enable to see all AT commands (verbose)
    -DCONFIG_BT_BLE_50_FEATURES_SUPPORTED

    ; PubSubClient MQTT buffer size (must be larger than max payload + topic + headers)
    -DMQTT_MAX_PACKET_SIZE=512

board_build.partitions = huge_app.csv  

; =============================================================================
; FLEET GPS TRACKER — Anti-Theft Transport Company
; WiFi + HiveMQ TLS, AXP2101 PMU, SD card buffer
; =============================================================================
[env:fleet-gps-tracker]
platform = espressif32@6.3.0
framework = arduino
board = esp32s3box

upload_speed = 921600
monitor_speed = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DTINY_GSM_MODEM_SIM7080
    -DTINY_GSM_RX_BUFFER=1024
    -DMQTT_MAX_PACKET_SIZE=512
    -DCONFIG_BT_BLE_50_FEATURES_SUPPORTED

board_build.partitions = huge_app.csv
